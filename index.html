<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário CA</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;

            background-image: url("https://visite.museus.gov.br/wp-content/uploads/tainacan-items/14/623267/LogoCA.png");
            background-size: cover;      
            background-position: center;   
            background-repeat: no-repeat;  
            background-attachment: fixed;   
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 {
            color: #333;
            margin-top: 50px;
            background-color: rgba(255, 255, 255, 0.7); 
            padding: 10px;
            border-radius: 8px;
        }

        form {
            width: 300px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.9); 
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box; 
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Formulário Camargo Aranha</h1>

    <form>
        <label>Nome:</label>
        <input type="text" required placeholder="Nome Exemplo"> 
        <label>Email:</label>
        <input type="email" required placeholder="exemploemail123@gmail.com">
    
        <label>CPF:</label>
        <input type="text" required placeholder="000.000.000-00">

    <label>RG:</label>
    <input type="text" required placeholder="00.000.000-00">
        <label>Idade</label>
        <input type="text" required placeholder="00">
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>

    <script src="js/teste.js"></script>
    <script src="js/soma.js"></script>
    
</body>
</html>
